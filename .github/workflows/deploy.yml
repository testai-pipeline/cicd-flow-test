name: Go Deploy

on:
  push:
    branches:
      - main
  workflow_run:
    workflows: ["Go Build and Test"]
    types: [completed]
  workflow_dispatch: # Allows manual triggering of the workflow

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production # As per specific requirement for deploy.yml
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # Specify the Go version

      - name: Install dependencies
        run: |
          go mod tidy
          go mod download

      - name: Build application
        run: go build -o myapp -v ./... # Builds an executable named 'myapp'

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-app-binary
          path: myapp

